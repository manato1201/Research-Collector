name: Daily Research Collect

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install feedparser requests python-dotenv
          pip install "notebooklm-py"

      - name: Download previous seen_urls.txt
        uses: actions/download-artifact@v4
        with:
          name: seen-urls
          path: .
        continue-on-error: true

      - name: Check auth
        env:
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
        run: python main.py --mode check

      - name: Run daily collect
        env:
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
          NOTEBOOKLM_WEEKLY_DIGEST_ID: ${{ secrets.NOTEBOOKLM_WEEKLY_DIGEST_ID }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py --mode daily

      - name: Upload seen_urls.txt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seen-urls
          path: seen_urls.txt
          retention-days: 400
          overwrite: true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collect-log-${{ github.run_number }}
          path: output/
          retention-days: 14

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'auth-expired'
            });
            if (issues.data.length === 0) {
              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              const body = [
                '## NotebookLM\u8a8d\u8a3c\u304c\u5207\u308c\u3066\u3044\u307e\u3059',
                '',
                'Daily Research Collect \u304c\u5931\u6557\u3057\u307e\u3057\u305f\u3002',
                'PowerShell\u3067\u4ee5\u4e0b\u3092\u5b9f\u884c\u3057\u3066\u304f\u3060\u3055\u3044\u3002',
                '',
                '```powershell',
                '.\\refresh_auth.ps1',
                '```',
                '',
                `**\u5b9f\u884c\u30ed\u30b0:** [Actions #${context.runNumber}](${runUrl})`,
                '',
                '\u5bfe\u51e6\u5b8c\u4e86\u5f8c\u3001\u3053\u306eIssue\u3092\u9589\u3058\u3066\u304f\u3060\u3055\u3044\u3002'
              ].join('\n');
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'NotebookLM\u8a8d\u8a3c\u5207\u308c - \u518d\u30ed\u30b0\u30a4\u30f3\u304c\u5fc5\u8981\u3067\u3059',
                labels: ['auth-expired'],
                body: body
              });
            }
