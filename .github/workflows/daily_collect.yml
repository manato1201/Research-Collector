name: Daily Research Collect

on:
  schedule:
    # JST 6:00 = UTC 21:00（前日）
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install feedparser requests python-dotenv
          pip install "notebooklm-py"

      # ── 前回の seen_urls.txt を復元 ────────────────────────
      - name: Download previous seen_urls.txt
        uses: actions/download-artifact@v4
        with:
          name: seen-urls
          path: .
        continue-on-error: true  # 初回は存在しないためエラーを無視

      # ── 認証チェック ────────────────────────────────────────
      - name: Check auth
        env:
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
        run: python main.py --mode check

      # ── デイリー収集実行 ────────────────────────────────────
      - name: Run daily collect
        env:
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
          NOTEBOOKLM_WEEKLY_DIGEST_ID: ${{ secrets.NOTEBOOKLM_WEEKLY_DIGEST_ID }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py --mode daily

      # ── seen_urls.txt を artifact として保存（上書き） ──────
      - name: Upload seen_urls.txt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seen-urls
          path: seen_urls.txt
          retention-days: 400
          overwrite: true

      # ── ログを artifacts として保存 ─────────────────────────
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collect-log-${{ github.run_number }}
          path: output/
          retention-days: 14
