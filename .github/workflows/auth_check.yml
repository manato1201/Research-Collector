name: Weekly Auth Check

on:
  schedule:
    # 毎週日曜 AM 5:00 JST = UTC 土曜 20:00
    # daily_collect（UTC 21:00）の1時間前に実行
    - cron: '0 20 * * 0'
  workflow_dispatch:

jobs:
  auth-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install "notebooklm-py"

      - name: Check NotebookLM auth
        env:
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
        run: |
          python main.py --mode check
          echo "✅ 認証OK - 今週のデイリー収集は正常に動作します"

