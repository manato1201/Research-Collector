name: Weekly Auth Check

on:
  schedule:
    # 毎週日曜 AM 5:00 JST = UTC 土曜 20:00
    # daily_collect（UTC 21:00）の1時間前に実行
    - cron: '0 20 * * 0'
  workflow_dispatch:

jobs:
  auth-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install "notebooklm-py==0.7.3"

      # ── Cookie残日数の事前検知 ──────────────────────────────
      - name: Check cookie expiry
        id: expiry_check
        env:
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
        run: python -m nbklm.auth_monitor

      - name: Create issue on upcoming expiry
        if: steps.expiry_check.outputs.needs_refresh == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const daysRemaining = "${{ steps.expiry_check.outputs.days_remaining }}";
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'refresh-soon'
            });
            if (issues.data.length === 0) {
              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              const body = [
                '## ⏰ NotebookLM認証の事前通知',
                '',
                `Cookieの残日数が ${daysRemaining} 日 です。`,
                '失効前に以下を実行してください（今週中を目安）：',
                '',
                '```powershell',
                'cd C:\\Users\\matuu\\Desktop\\GameDevelopment\\Research-Collector',
                '.\\refresh_auth.ps1',
                '```',
                '',
                `**実行ログ:** [Actions #${context.runNumber}](${runUrl})`,
                '',
                '対処完了後は refresh_auth.ps1 が自動でこのIssueを閉じます。'
              ].join('\n');
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `⏰ NotebookLM認証、残り${daysRemaining}日で失効 - 事前更新を推奨`,
                labels: ['refresh-soon'],
                body: body
              });
              console.log('Issue created.');
            } else {
              console.log('refresh-soon issue already exists, skipping.');
            }

      # ── 認証チェック(リアクティブ) ──────────────────────────
      - name: Check NotebookLM auth
        id: auth_check
        env:
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
        run: |
          python main.py --mode check && \
            echo "auth_ok=true" >> $GITHUB_OUTPUT || \
            echo "auth_ok=false" >> $GITHUB_OUTPUT
        continue-on-error: true

      # ── 認証OK ─────────────────────────────────────────────
      - name: Auth is valid
        if: steps.auth_check.outputs.auth_ok == 'true'
        run: echo "✅ 認証は有効です。今週のデイリー収集は正常に動作します。"

      # ── 診断: ノートブックのソース数を確認(一時) ─────────────
      - name: Debug notebook source counts
        env:
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
        run: |
          python -c "
          import asyncio
          from nbklm.client import _make_client

          async def main():
              async with await _make_client() as client:
                  notebooks = await client.notebooks.list()
                  notebooks.sort(key=lambda nb: nb.sources_count, reverse=True)
                  print(f'total notebooks: {len(notebooks)}')
                  for nb in notebooks[:15]:
                      print(f'{nb.sources_count:4d}  {nb.title}')

          asyncio.run(main())
          "

      # ── 認証切れ → Issue作成 ────────────────────────────────
      - name: Create issue on auth failure
        if: steps.auth_check.outputs.auth_ok == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'auth-expired'
            });
            if (issues.data.length === 0) {
              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              const body = [
                '## \ud83d\udd10 NotebookLM\u8a8d\u8a3c\u5207\u308c',
                '',
                'Weekly Auth Check\u3067\u8a8d\u8a3c\u5207\u308c\u3092\u691c\u77e5\u3057\u307e\u3057\u305f\u3002',
                '\u4eca\u5468\u306e\u30c7\u30a4\u30ea\u30fc\u53ce\u96c6\u304c\u5931\u6557\u3059\u308b\u53ef\u80fd\u6027\u304c\u3042\u308a\u307e\u3059\u3002',
                '',
                'PowerShell\u3067\u4ee5\u4e0b\u3092\u5b9f\u884c\u3057\u3066\u304f\u3060\u3055\u3044\uff1a',
                '',
                '```powershell',
                'cd C:\\Users\\matuu\\Desktop\\GameDevelopment\\Research-Collector',
                '.\\refresh_auth.ps1',
                '```',
                '',
                `**\u5b9f\u884c\u30ed\u30b0:** [Actions #${context.runNumber}](${runUrl})`,
                '',
                '\u5bfe\u51e6\u5b8c\u4e86\u5f8c\u3001\u3053\u306eIssue\u3092\u9589\u3058\u3066\u304f\u3060\u3055\u3044\u3002'
              ].join('\n');
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '\ud83d\udd10 NotebookLM\u8a8d\u8a3c\u5207\u308c - \u624b\u52d5\u518d\u30ed\u30b0\u30a4\u30f3\u304c\u5fc5\u8981\u3067\u3059',
                labels: ['auth-expired'],
                body: body
              });
              console.log('Issue created.');
            } else {
              console.log('Issue already exists, skipping.');
            }
