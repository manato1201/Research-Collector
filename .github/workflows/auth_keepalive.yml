name: Auth Keepalive

# NotebookLMのセッション用Cookie(__Secure-1PSIDTS)は15〜20分ごとに
# ローテーションしないと失効する。notebooklm-py 0.7.3 の `auth refresh` で
# 定期的にローテーションさせ、その結果をSecretへ書き戻す。
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install notebooklm-py
        run: pip install "notebooklm-py==0.7.3"

      - name: Write current auth to default storage path
        env:
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
        run: |
          mkdir -p ~/.notebooklm
          python -c "
          import json, os
          data = json.loads(os.environ['NOTEBOOKLM_AUTH_JSON'])
          with open(os.path.expanduser('~/.notebooklm/storage_state.json'), 'w', encoding='utf-8') as f:
              json.dump(data, f)
          "

      - name: Refresh session (rotate cookies)
        run: notebooklm auth refresh -q

      - name: Update NOTEBOOKLM_AUTH_JSON secret with rotated cookies
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_SECRETS_WRITE }}
        run: |
          python -c "
          import json, os
          # notebooklm-py 0.7.3はコマンド実行時に自動でプロファイル形式へ移行するため、
          # legacyパスに書いたファイルもprofileパスへ移動している場合がある。両方確認する。
          legacy_path = os.path.expanduser('~/.notebooklm/storage_state.json')
          profile_path = os.path.expanduser('~/.notebooklm/profiles/default/storage_state.json')
          path = profile_path if os.path.exists(profile_path) else legacy_path
          with open(path, encoding='utf-8') as f:
              print(json.dumps(json.load(f), separators=(',', ':')))
          " | gh secret set NOTEBOOKLM_AUTH_JSON --repo ${{ github.repository }}

      # ── keepalive失敗 → Issue作成 ────────────────────────────
      # auth refreshが失敗する = セッションが完全に切れており、
      # keepalive自身では回復できない(refresh_auth.ps1での再ログインが必要)。
      # daily_collect/auth_checkと同じauth-expiredラベルを使い、通知を一本化する。
      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'auth-expired'
            });
            if (issues.data.length === 0) {
              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              const body = [
                '## NotebookLM認証が切れています',
                '',
                'Auth Keepalive(15分おきのセッションローテーション)が失敗しました。',
                'セッション自体が失効しているため、keepaliveでは回復できません。',
                'PowerShellで以下を実行してください。',
                '',
                '```powershell',
                '.\\refresh_auth.ps1',
                '```',
                '',
                `**実行ログ:** [Actions #${context.runNumber}](${runUrl})`,
                '',
                '対処完了後、このIssueは自動で閉じられます。'
              ].join('\n');
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'NotebookLM認証切れ - 再ログインが必要です',
                labels: ['auth-expired'],
                body: body
              });
            }
