name: Weekly Research Digest

on:
  schedule:
    # 月曜 JST 7:00 = UTC 日曜 22:00
    - cron: '0 22 * * 0'
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Deep Research は時間がかかる

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install feedparser requests python-dotenv
          pip install "notebooklm-py[browser]"
          playwright install chromium
          playwright install-deps

      - name: Restore NotebookLM auth
        run: |
          mkdir -p ~/.notebooklm
          echo "${{ secrets.NOTEBOOKLM_STORAGE_STATE }}" \
            | base64 -d > ~/.notebooklm/storage_state.json

      - name: Check auth
        run: python main.py --mode check

      - name: Generate weekly digest
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py --mode weekly

      - name: Upload digest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-digest-${{ github.run_number }}
          path: output/weekly_digest_*.md
          retention-days: 90
