name: Weekly Research Digest

on:
  schedule:
    # 2日に1回 JST 7:00 = UTC 22:00（前日）
    # cronの日付フィールドはカレンダー日基準のため、月末をまたぐ時にまれに
    # 連続実行になることがある（実用上は許容範囲として許容する）
    - cron: '0 22 */2 * *'
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Deep Research は時間がかかる
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install feedparser requests python-dotenv
          pip install "notebooklm-py==0.7.3"

      # ── 認証チェック ────────────────────────────────────────
      - name: Check auth
        env:
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
        run: python main.py --mode check

      # ── 週次Digest生成 ──────────────────────────────────────
      - name: Generate weekly digest
        env:
          NOTEBOOKLM_AUTH_JSON: ${{ secrets.NOTEBOOKLM_AUTH_JSON }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py --mode weekly

      - name: Upload digest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-digest-${{ github.run_number }}
          path: output/weekly_digest_*.md
          retention-days: 90

      - name: Update health status
        if: always()
        run: python scripts/update_readme_health.py

      - name: Commit health status
        if: always()
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add health.json README.md
          git diff --cached --quiet || git commit -m "chore: update health status [skip ci]"
          git push

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'weekly-digest-failed'
            });
            if (issues.data.length === 0) {
              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              const body = [
                '## Weekly Research Digest が失敗しました',
                '',
                `**実行ログ:** [Actions #${context.runNumber}](${runUrl})`,
                '',
                '認証切れが原因の場合は `refresh_auth.ps1` を実行してください。',
                'それ以外の場合はログを確認してください。',
                '',
                '対処完了後は workflow_dispatch で再実行し、成功したらこのIssueを閉じてください。'
              ].join('\n');
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Weekly Research Digest 失敗',
                labels: ['weekly-digest-failed'],
                body: body
              });
            }